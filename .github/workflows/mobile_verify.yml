name: CI / mobile_verify

on:
  pull_request:

jobs:
  verify_mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test -- --watch=false --passWithNoTests

      - name: Expo Doctor
        run: npx expo-doctor
